<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1>📝 User Registration</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
    </nav>
</header>

<main>

    <div class="form-container">

        <h2>Create Account</h2>

        <input type="text" id="name" placeholder="Enter Name" autocomplete="off">

        <input type="email" id="email" placeholder="Enter Email" autocomplete="off">

        <input type="password" id="password" placeholder="Enter Password" autocomplete="new-password">

        <button onclick="registerUser()">Register</button>

    </div>

</main>

<script src="js/register.js"></script>

</body>
</html>
